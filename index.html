<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Sort</title>
    <style>
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #f0f0f0; font-family: sans-serif; color: #333; 
            overflow: hidden; position: fixed; touch-action: none;
        }
        
        /* 広告枠：上下150px固定 */
        #ad-top, #ad-bottom { 
            position: absolute; left: 0; width: 100%; height: 150px; 
            background: #333; z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        #ad-top { top: 0; }
        #ad-bottom { bottom: 0; }
        iframe { border: none; width: 100%; height: 100%; }

        #main-container {
            position: absolute;
            top: 150px; bottom: 150px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #f0f0f0; z-index: 10;
        }

        #score-ui { position: absolute; top: 10px; font-size: 20px; font-weight: bold; color: #333; display: none; }
        
        #target-card {
            width: 140px; height: 140px; background: white; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 75px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 20; transition: transform 0.15s ease-out, opacity 0.15s;
        }

        .guide { position: absolute; top: 50%; transform: translateY(-50%); font-size: 32px; font-weight: bold; opacity: 0.2; pointer-events: none; }
        #left-guide { left: 15px; color: #ff6b6b; text-align: center; }
        #right-guide { right: 15px; color: #4ecdc4; text-align: center; }

        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200; padding: 10px;
        }

        #ad-middle-container { width: 320px; height: 100px; background: rgba(0,0,0,0.05); margin: 15px 0; display: none; justify-content: center; align-items: center; border: 1px solid #ddd; }
        
        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
        .menu-btn { width: 260px; padding: 15px; font-size: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
        #retry-btn { background: #333; color: white; box-shadow: 0 4px #000; }
        #retry-btn:disabled { background: #ccc; box-shadow: none; opacity: 0.7; }
        #other-games-btn { background: #ff4081; color: white; box-shadow: 0 4px #c2185b; }

        #bigAdScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; justify-content: center; align-items: center; }
        .ad-frame-wrapper { width: 95%; height: 85%; position: relative; }
        .ad-close-btn { position: absolute; top: -15px; right: -15px; color: white; font-size: 22px; font-weight: bold; cursor: pointer; background: rgba(0,0,0,0.8); width: 44px; height: 44px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 3100; border: 2px solid white; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="ad-top"><iframe id="frame-top" src="ad.html?pos=top"></iframe></div>

    <div id="main-container">
        <div id="score-ui">TIME: 10.0 | SCORE: 0</div>
        <div id="left-guide" class="guide">🐶<br>左</div>
        <div id="target-card">？</div>
        <div id="right-guide" class="guide">右<br>🐱</div>

        <div id="menuScreen">
            <h2 id="result-msg" style="color:#333; margin: 0; font-size: 32px;">Animal Sort</h2>
            <p id="menu-desc" style="margin:10px 0; font-size: 15px; color: #666; text-align: center;">犬は左へ、猫は右へフリック！<br>BEST: <span id="best-ui">0</span></p>
            
            <div id="ad-middle-container">
                <script async src="https://imp-adedge.i-mobile.co.jp/script/v1/spot.js?20220104"></script>
                <div id="im-1e6de436ea850948e238e975a93767eb">
                    <script>(window.adsbyimobile=window.adsbyimobile||[]).push({pid:84561,mid:590804,asid:1924211,type:"banner",display:"inline",elementid:"im-1e6de436ea850948e238e975a93767eb"})</script>
                </div>
            </div>

            <div class="menu-btn-group">
                <button id="retry-btn" class="menu-btn" onclick="startNewGame()">★ スタート！ ★</button>
                <a href="https://saaaachi.github.io/" class="menu-btn" id="other-games-btn">他のゲームへ</a>
            </div>
        </div>
        
        <div id="bigAdScreen"><div class="ad-frame-wrapper"><div id="ad-close-btn" class="ad-close-btn" onclick="closeBigAd()"></div><iframe id="ad-large-frame" src="" style="width:100%; height:100%; border:none;"></iframe></div></div>
    </div>

    <div id="ad-bottom"><iframe id="frame-bottom" src="ad.html?pos=bottom"></iframe></div>

    <script>
        const targetCard = document.getElementById("target-card"), scoreUi = document.getElementById("score-ui"), menuScreen = document.getElementById("menuScreen"), resultMsg = document.getElementById("result-msg"), bestUi = document.getElementById("best-ui"), retryBtn = document.getElementById("retry-btn"), adMid = document.getElementById("ad-middle-container"), mainContainer = document.getElementById("main-container");

        let score = 0, bestScore = localStorage.getItem("animal_sort_best") || 0, playCount = 0;
        let currentType = "", gameActive = false, timeLeft = 10, timer, startX = 0;

        bestUi.innerText = bestScore;

        function startNewGame() {
            menuScreen.style.display = "none"; adMid.style.display = "none"; scoreUi.style.display = "block";
            gameActive = true; score = 0; timeLeft = 10;
            nextAnimal(); startTimer();
        }

        function nextAnimal() {
            currentType = Math.random() > 0.5 ? "dog" : "cat";
            targetCard.innerText = currentType === "dog" ? "🐶" : "🐱";
            targetCard.style.transition = "none";
            targetCard.style.transform = "translateX(0) scale(1) rotate(0deg)";
            targetCard.style.opacity = "1";
            setTimeout(() => { targetCard.style.transition = "transform 0.15s ease-out, opacity 0.15s"; }, 10);
        }

        mainContainer.addEventListener("touchstart", (e) => { if(!gameActive) return; startX = e.touches[0].clientX; });
        mainContainer.addEventListener("touchend", (e) => {
            if(!gameActive) return;
            let diffX = e.changedTouches[0].clientX - startX;
            if (Math.abs(diffX) > 40) {
                const choice = diffX < 0 ? "dog" : "cat";
                targetCard.style.transform = `translateX(${diffX > 0 ? 200 : -200}px) rotate(${diffX > 0 ? 20 : -20}deg) scale(0.5)`;
                targetCard.style.opacity = "0";
                setTimeout(() => checkAnswer(choice), 100);
            }
        });

        function checkAnswer(choice) {
            if(!gameActive) return;
            if(choice === currentType) {
                score++; timeLeft += 0.4; nextAnimal();
            } else {
                timeLeft -= 1.5; nextAnimal();
                mainContainer.style.background = "#ffcfcf";
                setTimeout(() => mainContainer.style.background = "#f0f0f0", 100);
            }
        }

        function startTimer() {
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                if(!gameActive) return;
                timeLeft -= 0.1;
                scoreUi.innerText = `TIME: ${Math.max(0, timeLeft).toFixed(1)} | SCORE: ${score}`;
                if(timeLeft <= 0) gameOver();
            }, 100);
        }

        function gameOver() {
            gameActive = false; playCount++; clearInterval(timer);
            if(score > bestScore) {
                bestScore = score; localStorage.setItem("animal_sort_best", bestScore);
                bestUi.innerText = bestScore;
            }
            resultMsg.innerText = "TIME UP!";
            document.getElementById("menu-desc").innerText = "SCORE: " + score + "\nBEST: " + bestScore;
            retryBtn.innerText = "お待ちください..."; retryBtn.disabled = true;
            adMid.style.display = "flex"; menuScreen.style.display = "flex";
            setTimeout(() => { retryBtn.disabled = false; retryBtn.innerText = "もう一度遊ぶ"; }, 1500);
            if(playCount % 2 === 0) setTimeout(showBigAd, 500);
        }

        function showBigAd() {
            const screen = document.getElementById("bigAdScreen"), closeBtn = document.getElementById("ad-close-btn");
            document.getElementById("ad-large-frame").src = "./ad.large.html?t=" + Date.now();
            screen.style.display = "flex";
            let countdown = 5; closeBtn.style.display = "flex"; closeBtn.innerText = countdown; closeBtn.style.pointerEvents = "none";
            const timerInt = setInterval(() => {
                countdown--; closeBtn.innerText = countdown;
                if (countdown <= 0) { clearInterval(timerInt); closeBtn.innerText = "×"; closeBtn.style.pointerEvents = "auto"; }
            }, 1000);
        }
        function closeBigAd() { document.getElementById("bigAdScreen").style.display = "none"; }
    </script>
</body>
</html>
