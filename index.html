<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Sort - Flick Puzzle</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; touch-action: none; }
        body { background: #f8f9fa; font-family: 'Hiragino Sans', 'Meiryo', sans-serif; display: flex; flex-direction: column; }
        
        /* 上部広告：100px 固定 */
        #ad-top { width: 100%; height: 100px; background: #333; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 100; border-bottom: 3px solid #ff6b6b; }

        /* ゲームエリア */
        #game-outer { flex-grow: 1; position: relative; width: 100%; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #score-ui { position: absolute; top: 15px; font-size: 22px; font-weight: bold; color: #444; z-index: 10; background: rgba(255,255,255,0.8); padding: 5px 15px; border-radius: 20px; display: none; }
        
        #target-card {
            width: 160px; height: 160px; background: white; border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 90px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            z-index: 20; border: 4px solid #fff;
        }

        .guide { position: absolute; top: 50%; transform: translateY(-50%); font-size: 36px; font-weight: bold; opacity: 0.3; pointer-events: none; }
        #left-guide { left: 20px; color: #ff6b6b; text-align: center; }
        #right-guide { right: 20px; color: #4ecdc4; text-align: center; }

        /* メニュー画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 500; padding: 20px; 
        }

        /* 【収益】300x250 レクタングル */
        #ad-middle-box {
            width: 300px; height: 250px; background: #eee;
            margin: 15px 0; display: none; justify-content: center; align-items: center;
            border-radius: 15px; border: 1px solid #ddd; overflow: hidden;
        }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px; }
        .menu-btn { width: 280px; padding: 18px; font-size: 20px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #retry-btn { background: #333; color: white; box-shadow: 0 5px #000; }
        #retry-btn:disabled { background: #bbb; box-shadow: none; color: #777; }
        .sub-btn { background: #ff4081; color: white; box-shadow: 0 5px #c2185b; font-size: 16px; }

        /* インタースティシャル */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 350px; background: #fff; position: relative; border-radius: 15px; }
        #close-ad-btn { position: absolute; top: -55px; right: 0; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="score-ui">TIME: 10.0 | SCORE: 0</div>
        <div id="left-guide" class="guide">🐶<br>左へ</div>
        <div id="target-card">？</div>
        <div id="right-guide" class="guide">右へ<br>🐱</div>

        <div id="menuScreen">
            <h2 id="result-msg" style="color:#333; margin: 0; font-size: 36px; letter-spacing: 2px;">Animal Sort</h2>
            <p id="menu-desc" style="margin:10px 0; font-size: 16px; color: #666; font-weight: bold; text-align: center;">犬は左、猫は右へフリック！<br>ハイスコア：<span id="best-ui">0</span></p>
            
            <div id="ad-middle-box">
                <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="9050127185"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="menu-btn-group">
                <button id="retry-btn" class="menu-btn" onclick="startNewGame()">★ スタート！ ★</button>
                <a href="https://saaaachi.github.io/" class="sub-btn menu-btn">他のゲームで遊ぶ</a>
            </div>
        </div>

        <div id="inter-screen">
            <div class="inter-content">
                <div id="close-ad-btn" onclick="closeInterAd()">5</div>
                <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:15px; background:#fff;"></iframe>
            </div>
        </div>
    </div>

    <script>
        const targetCard = document.getElementById("target-card"), 
              scoreUi = document.getElementById("score-ui"), 
              menuScreen = document.getElementById("menuScreen"), 
              resultMsg = document.getElementById("result-msg"), 
              bestUi = document.getElementById("best-ui"), 
              retryBtn = document.getElementById("retry-btn"), 
              adMid = document.getElementById("ad-middle-box"), 
              gameOuter = document.getElementById("game-outer");

        let score = 0, bestScore = localStorage.getItem("animal_sort_best") || 0, playCount = 0;
        let currentType = "", gameActive = false, timeLeft = 10, timer, startX = 0;

        bestUi.innerText = bestScore;

        function startNewGame() {
            menuScreen.style.display = "none"; 
            adMid.style.display = "none"; 
            scoreUi.style.display = "block";
            gameActive = true; 
            score = 0; 
            timeLeft = 10;
            nextAnimal(); 
            startTimer();
        }

        function nextAnimal() {
            currentType = Math.random() > 0.5 ? "dog" : "cat";
            targetCard.innerText = currentType === "dog" ? "🐶" : "🐱";
            targetCard.style.transition = "none";
            targetCard.style.transform = "translateX(0) scale(1) rotate(0deg)";
            targetCard.style.opacity = "1";
            setTimeout(() => { 
                targetCard.style.transition = "transform 0.2s ease-out, opacity 0.2s"; 
            }, 20);
        }

        // スワイプ操作
        gameOuter.addEventListener("touchstart", (e) => { 
            if(!gameActive) return; 
            startX = e.touches[0].clientX; 
        });

        gameOuter.addEventListener("touchend", (e) => {
            if(!gameActive) return;
            let diffX = e.changedTouches[0].clientX - startX;
            if (Math.abs(diffX) > 50) {
                const choice = diffX < 0 ? "dog" : "cat";
                targetCard.style.transform = `translateX(${diffX > 0 ? 300 : -300}px) rotate(${diffX > 0 ? 30 : -30}deg) scale(0.5)`;
                targetCard.style.opacity = "0";
                setTimeout(() => checkAnswer(choice), 150);
            }
        });

        function checkAnswer(choice) {
            if(!gameActive) return;
            if(choice === currentType) {
                score++; 
                timeLeft += Math.max(0.2, 0.5 - (score * 0.005)); // 徐々に加算時間を減らす
                nextAnimal();
            } else {
                timeLeft -= 1.5; 
                gameOuter.style.background = "#ffcfcf";
                setTimeout(() => { if(gameActive) gameOuter.style.background = "#f0f2f5"; }, 150);
                nextAnimal();
            }
        }

        function startTimer() {
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                if(!gameActive) return;
                timeLeft -= 0.1;
                scoreUi.innerText = `TIME: ${Math.max(0, timeLeft).toFixed(1)} | SCORE: ${score}`;
                if(timeLeft <= 0) gameOver();
            }, 100);
        }

        function gameOver() {
            gameActive = false; 
            playCount++; 
            clearInterval(timer);
            gameOuter.style.background = "#f0f2f5";
            
            if(score > bestScore) {
                bestScore = score; 
                localStorage.setItem("animal_sort_best", bestScore);
                bestUi.innerText = bestScore;
            }
            
            resultMsg.innerText = "TIME UP!";
            document.getElementById("menu-desc").innerHTML = "SCORE: " + score + "<br>BEST: " + bestScore;
            
            retryBtn.innerText = "お待ちください..."; 
            retryBtn.disabled = true;
            adMid.style.display = "flex"; 
            menuScreen.style.display = "flex";

            // 1.5秒の誤タップ防止ガード
            setTimeout(() => { 
                retryBtn.disabled = false; 
                retryBtn.innerText = "もう一度遊ぶ"; 
            }, 1500);

            // 3回ごとにインタースティシャル
            if (playCount % 3 === 0) {
                setTimeout(showInterAd, 500);
            }
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), 
                  closeBtn = document.getElementById("close-ad-btn"), 
                  ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let count = 5;
            closeBtn.innerText = count;
            closeBtn.style.pointerEvents = "none";
            const itv = setInterval(() => {
                count--;
                if(count > 0) closeBtn.innerText = count;
                else {
                    clearInterval(itv);
                    closeBtn.innerText = "×";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }
    </script>
</body>
</html>
